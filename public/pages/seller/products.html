<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f0; min-height: 100vh; }
        .navbar { background: #7f275a; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: #f5f2f4; font-size: 24px; font-weight: 800; }
        .navbar span { color: #f1eeef; font-size: 14px; }
        .logout-btn { background: #c6446d; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .layout { display: flex; min-height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #bc6891; padding: 20px 0; }
        .sidebar a { display: block; color: #ffffff; text-decoration: none; padding: 14px 24px; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #5f1c4d; color: white; }
        .sidebar a span { margin-right: 10px; }
        .main { flex: 1; padding: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 24px; color: #471737; font-weight: 700; }
        .add-btn { background: #8e3375; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
        .add-btn:hover { background: #b75093; }
        .table-box { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #5d1d48; color: white; }
        thead th { padding: 14px 16px; text-align: left; font-size: 13px; font-weight: 600; }
        tbody tr { border-bottom: 1px solid #cab5c5; transition: background 0.2s; }
        tbody tr:hover { background: #de8bca; }
        tbody td { padding: 14px 16px; font-size: 13px; color: #333; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; border: 2px solid #F5E1E8; }
        .stock-low { color: #dc3545; font-weight: 600; }
        .stock-ok { color: #441223; font-weight: 600; }
        .delete-btn { background: #ffe0e0; color: #cc0000; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .delete-btn:hover { background: #4a0b0b; color: white; }
        .no-products { text-align: center; padding: 60px; color: #3A1320; }
        .no-products p { font-size: 16px; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>OrderEase</h1>
    <span id="shopName">My Shop</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"><span>📊</span> Dashboard</a>
        <a href="products.html" class="active"><span>📦</span> My Products</a>
        <a href="add-product.html"><span>➕</span> Add Product</a>
        <a href="orders.html"><span>📋</span> All Orders</a>
    </div>

    <div class="main">
        <div class="top-bar">
            <div class="page-title">📦 My Products</div>
            <a href="add-product.html" class="add-btn">➕ Add New Product</a>
        </div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="productList">
                    <tr>
                        <td colspan="6">
                            <div class="no-products">
                                <p>Loading products...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token    = localStorage.getItem('sellerToken');
    const shopName = localStorage.getItem('shopName');

    if (!token) window.location.href = 'login.html';
    document.getElementById('shopName').textContent = shopName || 'My Shop';

    async function loadProducts() {
        try {
            const response = await fetch('/api/products');
            const products = await response.json();
            const tbody    = document.getElementById('productList');

            if (!products || products.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="6">
                        <div class="no-products">
                            <p>No products yet!</p>
                            <a href="add-product.html" class="add-btn">➕ Add First Product</a>
                        </div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>
                        <img class="product-img"
                             src="${p.image.startsWith('http') ? p.image : '/images/' + p.image}"
                             onerror="this.src='https://placehold.co/50'"
                             alt="${p.name}">
                    </td>
                    <td><b>${p.name}</b><br>
                        <small style="color:#3A1320">
                            ${p.description ? p.description.substring(0,40)+'...' : ''}
                        </small>
                    </td>
                    <td>${p.category}</td>
                    <td><b>₹${p.price}</b></td>
                    <td class="${p.stock < 5 ? 'stock-low' : 'stock-ok'}">
                        ${p.stock} ${p.stock < 5 ? '⚠️' : '✅'}
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deleteProduct(${p.id})">
                            🗑️ Delete
                        </button>
                    </td>
                </tr>
            `).join('');

        } catch (err) {
            document.getElementById('productList').innerHTML =
                '<tr><td colspan="6" style="text-align:center;padding:20px;color:red;">Error loading products!</td></tr>';
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;
        try {
            const response = await fetch('/api/products/' + id, {
                method:  'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            if (response.ok) {
                alert('✅ Product deleted!');
                loadProducts();
            } else {
                alert('❌ ' + data.message);
            }
        } catch (err) {
            alert('Server error!');
        }
    }

    function logout() {
        localStorage.removeItem('sellerToken');
        localStorage.removeItem('sellerName');
        localStorage.removeItem('shopName');
        window.location.href = 'login.html';
    }

    loadProducts();
</script>

</body>
</html>
