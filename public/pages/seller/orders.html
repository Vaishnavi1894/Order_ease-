<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Orders — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #d7add1; min-height: 100vh; }
        .navbar { background: #632048; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { color: #ffffff; font-size: 24px; font-weight: 800; }
        .navbar span { color: #ffffff; font-size: 14px; text-transform: capitalize;}
        .logout-btn { background: #A6385B; color: white; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .layout { display: flex; min-height: calc(100vh - 60px); }
        .sidebar { width: 220px; background: #c878b0; padding: 20px 0; }
        .sidebar a { display: block; color: #F5E1E8; text-decoration: none; padding: 14px 24px; font-size: 14px; font-weight: 500; transition: background 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #571234; color: white; }
        .sidebar a span { margin-right: 10px; }
        .main { flex: 1; padding: 30px; }
        .page-title { font-size: 24px; color: #4e1b3e; font-weight: 700; margin-bottom: 24px; }
        .table-box { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #50173c; color: white; }
        thead th { padding: 14px 16px; text-align: left; font-size: 13px; font-weight: 600; }
        tbody tr { border-bottom: 1px solid #3b0931; transition: background 0.2s; }
        tbody tr:hover { background: #9d748a; }
        tbody td { padding: 14px 16px; font-size: 13px; color: #333; vertical-align: middle; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-Pending   { background: #481642; color: #ffffff; }
        .status-Confirmed { background: #08294b; color: #ffffff; }
        .status-Packed    { background: #3ea7c4; color: #ffffff; }
        .status-Shipped   { background: #185e28; color: #ffffff; }
        .status-Delivered { background: #ff09b9; color: #ffffff; }

        select {
            padding: 6px 10px;
            border: 2px solid #F5E1E8;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        .update-btn {
            background: #64204c;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 6px;
        }

        .update-btn:hover { background: #A6385B; }

        .no-orders { text-align: center; padding: 60px; color: #3A1320; font-size: 16px; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>OrderEase</h1>
    <span id="shopName">My Shop</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"><span>📊</span> Dashboard</a>
        <a href="products.html"><span>📦</span> My Products</a>
        <a href="add-product.html"><span>➕</span> Add Product</a>
        <a href="orders.html" class="active"><span>📋</span> All Orders</a>
    </div>

    <div class="main">
        <div class="page-title">📋 All Orders</div>

<!-- DATE FILTER -->
<div style="background:white; padding:16px 20px; border-radius:12px;
            box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-bottom:20px;
            display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
    <div>
        <label style="font-size:12px; font-weight:600; color:#632048;">From Date</label>
        <input type="date" id="fromDate"
               style="display:block; padding:8px 12px; border:2px solid #d7add1;
                      border-radius:8px; font-size:13px; outline:none; margin-top:4px;">
    </div>
    <div>
        <label style="font-size:12px; font-weight:600; color:#632048;">To Date</label>
        <input type="date" id="toDate"
               style="display:block; padding:8px 12px; border:2px solid #d7add1;
                      border-radius:8px; font-size:13px; outline:none; margin-top:4px;">
    </div>
    <div style="display:flex; gap:8px; margin-top:20px;">
        <button onclick="filterOrders()"
                style="background:#632048; color:white; border:none;
                       padding:10px 20px; border-radius:8px;
                       font-size:13px; font-weight:600; cursor:pointer;">
            🔍 Filter
        </button>
        <button onclick="clearFilter()"
                style="background:white; color:#632048; border:2px solid #d7add1;
                       padding:10px 20px; border-radius:8px;
                       font-size:13px; font-weight:600; cursor:pointer;">
            ✕ Clear
        </button>
    </div>
    <div style="margin-top:20px; font-size:13px; color:#632048; font-weight:600;">
        Total: <span id="orderCount">0</span> orders
    </div>
</div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Products</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th>Update Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="orderList">
                    <tr>
                        <td colspan="8">
                            <div class="no-orders">Loading orders...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const token    = localStorage.getItem('sellerToken');
    const shopName = localStorage.getItem('shopName');

    if (!token) window.location.href = 'login.html';
    document.getElementById('shopName').textContent = shopName || 'My Shop';

    let allOrders = [];

async function loadOrders() {
    try {
        const response = await fetch('/api/orders', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        allOrders = await response.json();
        renderOrders(allOrders);
    } catch (err) {
        document.getElementById('orderList').innerHTML =
            '<tr><td colspan="8" style="text-align:center;padding:20px;color:red;">Error loading orders!</td></tr>';
    }
}

function filterOrders() {
    const fromDate = document.getElementById('fromDate').value;
    const toDate   = document.getElementById('toDate').value;

    let filtered = allOrders;

    if (fromDate) {
        filtered = filtered.filter(o =>
            new Date(o.created_at) >= new Date(fromDate)
        );
    }

    if (toDate) {
        const to = new Date(toDate);
        to.setHours(23, 59, 59);
        filtered = filtered.filter(o =>
            new Date(o.created_at) <= to
        );
    }

    renderOrders(filtered);
}

function clearFilter() {
    document.getElementById('fromDate').value = '';
    document.getElementById('toDate').value   = '';
    renderOrders(allOrders);
}

function renderOrders(orders) {
    const tbody = document.getElementById('orderList');
    document.getElementById('orderCount').textContent = orders.length;

    if (!orders || orders.length === 0) {
        tbody.innerHTML = `
            <tr><td colspan="8">
                <div class="no-orders">No orders found!</div>
            </td></tr>`;
        return;
    }

    tbody.innerHTML = orders.map(o => `
        <tr>
            <td><b>#${o.id}</b></td>
            <td>
                <b>${o.customer_name}</b><br>
                <small style="color:#3A1320">${o.customer_phone}</small>
            </td>
            <td><small>${o.products}</small></td>
            <td><b>₹${o.total_amount}</b></td>
            <td>${o.payment_method}</td>
            <td>
                <span class="status-badge status-${o.status}">
                    ${o.status}
                </span>
            </td>
            <td>
                <select id="status-${o.id}">
                    <option value="Pending"   ${o.status==='Pending'   ? 'selected':''}>Pending</option>
                    <option value="Confirmed" ${o.status==='Confirmed' ? 'selected':''}>Confirmed</option>
                    <option value="Packed"    ${o.status==='Packed'    ? 'selected':''}>Packed</option>
                    <option value="Shipped"   ${o.status==='Shipped'   ? 'selected':''}>Shipped</option>
                    <option value="Delivered" ${o.status==='Delivered' ? 'selected':''}>Delivered</option>
                </select>
                <input type="text" id="tracking-${o.id}"
                       placeholder="Tracking number"
                       value="${o.tracking_number || ''}"
                       style="padding:6px; border:2px solid #d7add1;
                              border-radius:6px; font-size:12px;
                              margin-top:6px; width:130px;">
                <button class="update-btn" onclick="updateStatus(${o.id})">
                    Update
                </button>
            </td>
            <td><small>${new Date(o.created_at).toLocaleDateString()}</small></td>
        </tr>
    `).join('');
}
    async function updateStatus(orderId) {
        const status = document.getElementById('status-' + orderId).value;

        try {
            const response = await fetch('/api/orders/' + orderId + '/status', {
                method:  'PUT',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status })
            });

            const data = await response.json();
            if (response.ok) {
                alert('✅ Order status updated to ' + status);
                loadOrders();
            } else {
                alert('❌ ' + data.message);
            }
        } catch (err) {
            alert('Server error!');
        }
    }

    function logout() {
        localStorage.removeItem('sellerToken');
        localStorage.removeItem('sellerName');
        localStorage.removeItem('shopName');
        window.location.href = 'login.html';
    }

    loadOrders();
</script>

</body>
</html>
