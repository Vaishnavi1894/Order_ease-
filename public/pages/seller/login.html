<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Login — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #992377, #A6385B);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(26, 2, 21, 0.2);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #4c0f25;
            font-weight: 800;
        }

        .logo p {
            color: #5f1d32;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #53192d;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #4a1527;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #671c34;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #420830;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #4e1829;
        }

        .message {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #3A1320;
        }

        .message a {
            color: #491326;
            font-weight: 600;
            text-decoration: none;
        }

        .error {
            background: #3b112e;
            color: #cc0000;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .success {
            background: #3e1032;
            color: #F5E1E8;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h1>OrderEase</h1>
        <p>Seller Login</p>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button onclick="loginSeller()">Login to Dashboard</button>

    <div class="message">
        Don't have an account? 
        <a href="register.html">Register here</a>
    </div>
</div>

<script>
    async function loginSeller() {
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg   = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // Hide previous messages
        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';

        if (!email || !password) {
            errorMsg.textContent     = 'Please enter email and password!';
            errorMsg.style.display   = 'block';
            return;
        }

        try {
            const response = await fetch('/api/seller/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save token and seller info
                localStorage.setItem('sellerToken', data.token);
                localStorage.setItem('sellerName',  data.seller.name);
                localStorage.setItem('shopName',    data.seller.shop_name);

                successMsg.textContent   = 'Login successful! Redirecting...';
                successMsg.style.display = 'block';

                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else {
                errorMsg.textContent   = data.message;
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent   = 'Server error. Please try again!';
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
