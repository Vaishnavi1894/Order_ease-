<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f0;
            min-height: 100vh;
        }

        .navbar {
            background: #3a1030;
            padding: 16px 80px;
            display: flex;
            justify-content:center;
            align-items:end;
        }

        .navbar h1 { color: #fcfcfc; font-size: 24px; font-weight: 800; padding-right: 350px;}
        .navbar span { 
    color: #ffffff; 
    font-size: 14px; 
    margin-right: 130px;
     text-transform: capitalize;
}

        .logout-btn {
            background: #A6385B;
            color: white;
             border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .layout {
            display: flex;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 220px;
            background: #843176;
            padding: 20px 0;
        }

        .sidebar a {
            display: block;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #4f1842;
            color: white;
        }

        .sidebar a span { margin-right: 10px; }

        .main {
            flex: 1;
            padding: 30px;
        }

        .page-title {
            font-size: 24px;
            color: #381130;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .form-box {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #501d37;
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #3b0829;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #A6385B;
        }

        textarea { resize: vertical; min-height: 100px; }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .preview-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 2px solid #3f0e38;
        }

        button {
            background: #4b1633;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 8px;
        }

        button:hover { background: #8f1360; }

        .error {
            background: #ffe0e0;
            color: #8d0808;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .success {
            background: #F5E1E8;
            color: #F5E1E8;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>OrderEase</h1>
    <span id="shopName">My Shop</span>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="layout">
    <div class="sidebar">
        <a href="dashboard.html"><span>📊</span> Dashboard</a>
        <a href="products.html"><span>📦</span> My Products</a>
        <a href="add-product.html" class="active"><span>➕</span> Add Product</a>
        <a href="orders.html"><span>📋</span> All Orders</a>
    </div>

    <div class="main">
        <div class="page-title">➕ Add New Product</div>

        <div class="form-box">
            <div class="error"   id="errorMsg"></div>
            <div class="success" id="successMsg"></div>

            <div class="form-group">
                <label>Product Name *</label>
                <input type="text" id="name" placeholder="e.g. Chocolate Cake">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" 
                    placeholder="Describe your product..."></textarea>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="price" placeholder="e.g. 350">
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="stock" placeholder="e.g. 10">
                </div>
            </div>

            <div class="form-group">
                <label>Category *</label>
                <select id="category">
                    <option value="">-- Select Category --</option>
                    <option value="Food & Snacks">Food & Snacks</option>
                    <option value="Cakes & Bakery">Cakes & Bakery</option>
                    <option value="Health & Herbal">Health & Herbal</option>
                    <option value="Handicrafts">Handicrafts</option>
                    <option value="Beauty & Care">Beauty & Care</option>
                    <option value="Plants & Seeds">Plants & Seeds</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="image" accept="image/*" 
                    onchange="previewImage(event)">
                <img id="previewImg" class="preview-img" src="" alt="Preview">
            </div>

            <button onclick="addProduct()">Add Product</button>
        </div>
    </div>
</div>

<script>
    const token    = localStorage.getItem('sellerToken');
    const shopName = localStorage.getItem('shopName');

    if (!token) window.location.href = 'login.html';
    document.getElementById('shopName').textContent = shopName || 'My Shop';

    function previewImage(event) {
        const img = document.getElementById('previewImg');
        img.src = URL.createObjectURL(event.target.files[0]);
        img.style.display = 'block';
    }

    async function addProduct() {
        const name        = document.getElementById('name').value;
        const description = document.getElementById('description').value;
        const price       = document.getElementById('price').value;
        const stock       = document.getElementById('stock').value;
        const category    = document.getElementById('category').value;
        const imageFile   = document.getElementById('image').files[0];
        const errorMsg    = document.getElementById('errorMsg');
        const successMsg  = document.getElementById('successMsg');

        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';

        if (!name || !price || !category || !stock) {
            errorMsg.textContent   = 'Please fill all required fields!';
            errorMsg.style.display = 'block';
            return;
        }

        const formData = new FormData();
        formData.append('name',        name);
        formData.append('description', description);
        formData.append('price',       price);
        formData.append('stock',       stock);
        formData.append('category',    category);
        if (imageFile) formData.append('image', imageFile);

        try {
            const response = await fetch('/api/products', {
                method:  'POST',
                headers: { 'Authorization': 'Bearer ' + token },
                body:    formData
            });

            const data = await response.json();

            if (response.ok) {
                successMsg.textContent   = '✅ Product added successfully!';
                successMsg.style.display = 'block';

                // Clear form
                document.getElementById('name').value        = '';
                document.getElementById('description').value = '';
                document.getElementById('price').value       = '';
                document.getElementById('stock').value       = '';
                document.getElementById('category').value    = '';
                document.getElementById('image').value       = '';
                document.getElementById('previewImg').style.display = 'none';
            } else {
                errorMsg.textContent   = data.message;
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent   = 'Server error. Please try again!';
            errorMsg.style.display = 'block';
        }
    }

    function logout() {
        localStorage.removeItem('sellerToken');
        localStorage.removeItem('sellerName');
        localStorage.removeItem('shopName');
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
