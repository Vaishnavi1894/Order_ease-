<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Register — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #F5E1E8, #A6385B);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 480px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #F5E1E8;
            font-weight: 800;
        }

        .logo p {
            color: #A6385B;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #F5E1E8;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #F5E1E8;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        input:focus, textarea:focus {
            border-color: #A6385B;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #F5E1E8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #A6385B; }

        .message {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #3A1320;
        }

        .message a {
            color: #F5E1E8;
            font-weight: 600;
            text-decoration: none;
        }

        .error {
            background: #ffe0e0;
            color: #cc0000;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .success {
            background: #F5E1E8;
            color: #F5E1E8;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="register-box">
    <div class="logo">
        <h1>OrderEase</h1>
        <p>Create Seller Account</p>
    </div>

    <div class="error"   id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="form-group">
        <label>Your Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">
    </div>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password">
    </div>

    <div class="form-group">
        <label>Shop Name</label>
        <input type="text" id="shop_name" placeholder="Enter your shop name">
    </div>

    <div class="form-group">
        <label>Shop Description</label>
        <textarea id="shop_description" 
            placeholder="Tell customers about your shop..."></textarea>
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter your phone number">
    </div>

    <button onclick="registerSeller()">Create Account</button>

    <div class="message">
        Already have an account?
        <a href="login.html">Login here</a>
    </div>
</div>

<script>
    async function registerSeller() {
        const name             = document.getElementById('name').value;
        const email            = document.getElementById('email').value;
        const password         = document.getElementById('password').value;
        const shop_name        = document.getElementById('shop_name').value;
        const shop_description = document.getElementById('shop_description').value;
        const phone            = document.getElementById('phone').value;
        const errorMsg         = document.getElementById('errorMsg');
        const successMsg       = document.getElementById('successMsg');

        errorMsg.style.display   = 'none';
        successMsg.style.display = 'none';

        if (!name || !email || !password || !shop_name) {
            errorMsg.textContent   = 'Please fill all required fields!';
            errorMsg.style.display = 'block';
            return;
        }

        try {
            const response = await fetch('/api/seller/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, shop_name, shop_description, phone })
            });

            const data = await response.json();

            if (response.ok) {
                successMsg.textContent   = 'Account created! Redirecting to login...';
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                errorMsg.textContent   = data.message;
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            errorMsg.textContent   = 'Server error. Please try again!';
            errorMsg.style.display = 'block';
        }
    }
</script>

</body>
</html>
