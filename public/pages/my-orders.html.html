<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #d7add1; min-height: 100vh; }

        .navbar {
            background: #632048;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 { color: #ffffff; font-size: 24px; font-weight: 800; }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a:hover { color: #E8C674; }

        .cart-btn {
            background: #A6385B;
            color: white;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-left: 16px;
        }

        .logout-btn {
            background: #A6385B;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-left: 16px;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 24px;
            color: #4e1b3e;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid #d7add1;
        }

        .order-id {
            font-size: 18px;
            font-weight: 800;
            color: #632048;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-Pending   { background: #481642; color: #ffffff; }
        .status-Confirmed { background: #08294b; color: #ffffff; }
        .status-Packed    { background: #3ea7c4; color: #ffffff; }
        .status-Shipped   { background: #185e28; color: #ffffff; }
        .status-Delivered { background: #ff09b9; color: #ffffff; }

        .order-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .detail-item .label {
            font-size: 11px;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 14px;
            color: #4e1b3e;
            font-weight: 600;
        }

        .products-list {
            background: #d7add1;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #4e1b3e;
            font-weight: 600;
        }

        /* PROGRESS BAR */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            position: relative;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 0;
            right: 0;
            height: 2px;
            background: #d7add1;
            z-index: 0;
        }

        .progress-step {
            text-align: center;
            z-index: 1;
            flex: 1;
        }

        .progress-step .dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #d7add1;
            margin: 0 auto 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: #999;
        }

        .progress-step.done .dot {
            background: #632048;
            color: white;
        }

        .progress-step .step-label {
            font-size: 10px;
            color: #999;
        }

        .progress-step.done .step-label {
            color: #632048;
            font-weight: 700;
        }

        .no-orders {
            text-align: center;
            padding: 60px;
            color: #4e1b3e;
        }

        .no-orders p { font-size: 40px; margin-bottom: 16px; }
        .no-orders h3 { font-size: 20px; margin-bottom: 8px; color: #632048; }

        .shop-btn {
            display: inline-block;
            background: #632048;
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 16px;
        }

        .shop-btn:hover { background: #A6385B; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>OrderEase</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="my-orders.html">My Orders</a>
        <a href="cart.html" class="cart-btn">🛒 Cart</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <div class="page-title">📋 My Orders</div>
    <div id="ordersList"></div>
</div>

<script>
    const token = localStorage.getItem('customerToken');
    if (!token) window.location.href = 'login.html';

    const steps = ['Pending', 'Confirmed', 'Packed', 'Shipped', 'Delivered'];

    async function loadOrders() {
        try {
            const response = await fetch('/api/customer/orders', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const orders = await response.json();
            const div    = document.getElementById('ordersList');

            if (!orders || orders.length === 0) {
                div.innerHTML = `
                    <div class="no-orders">
                        <p>📦</p>
                        <h3>No orders yet!</h3>
                        <p style="font-size:14px; color:#632048;">
                            Start shopping to see your orders here
                        </p>
                        <a href="products.html" class="shop-btn">
                            Browse Products
                        </a>
                    </div>`;
                return;
            }

            div.innerHTML = orders.map(order => {
                const currentStep = steps.indexOf(order.status);
                return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-id">Order #${order.id}</div>
                        <span class="status-badge status-${order.status}">
                            ${order.status}
                        </span>
                    </div>

                    <div class="order-details">
                        <div class="detail-item">
                            <div class="label">Total Amount</div>
                            <div class="value">₹${order.total_amount}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Payment</div>
                            <div class="value">${order.payment_method}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">Order Date</div>
                            <div class="value">
                                ${new Date(order.created_at).toLocaleDateString()}
                            </div>
                        </div>
                    </div>

                    <div class="products-list">
                        🛍️ ${order.product_names}
                    </div>

                    <div class="progress-bar">
                        ${steps.map((step, i) => `
                            <div class="progress-step ${i <= currentStep ? 'done' : ''}">
                                <div class="dot">${i <= currentStep ? '✓' : i+1}</div>
                                <div class="step-label">${step}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }).join('');

        } catch (err) {
            document.getElementById('ordersList').innerHTML =
                '<p style="color:#632048;text-align:center;">Error loading orders!</p>';
        }
    }

    function logout() {
        localStorage.removeItem('customerToken');
        localStorage.removeItem('customerName');
        window.location.href = 'login.html';
    }

    loadOrders();
</script>

</body>
</html>
