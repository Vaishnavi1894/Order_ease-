<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — OrderEase</title>
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #dc8fc2; }

        .navbar {
            background: #5d073c;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 { color: #e4dae2; font-size: 24px; font-weight: 800; }

        .nav-links a {
            color: #efe7eb;
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a:hover { color: white; }

        .cart-btn {
            background: #a94b69;
            color: rgb(87, 8, 54);
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-left: 16px;
        }

        /* MAIN LAYOUT */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 24px;
        }

        /* FILTER SIDEBAR */
        .filter-box {
            background: rgb(84, 6, 49);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            height: fit-content;
        }

        .filter-box h3 {
            color: #e4d9dc;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .filter-group { margin-bottom: 20px; }

        .filter-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #efe4e8;
            margin-bottom: 8px;
        }

        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #220f16;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        .filter-group input:focus,
        .filter-group select:focus { border-color: #A6385B; }

        .filter-btn {
            width: 100%;
            background: #ffffff;
            color: rgb(7, 2, 2);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .filter-btn:hover { background: #A6385B; }

        .clear-btn {
            width: 100%;
            background: white;
            color: #25030f;
            border: 2px solid #F5E1E8;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        /* PRODUCTS SECTION */
        .products-section h2 {
            color: #490321;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .product-card {
            background: rgb(60, 3, 43);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(17, 1, 8, 0.06);
            transition: transform 0.2s;
            cursor: pointer;
        }

        .product-card:hover { transform: translateY(-4px); }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .product-info { padding: 14px; }
        .product-info .category { color: #fbf6f9; font-size: 11px; margin-bottom: 4px; }
        .product-info h4 { color: #F5E1E8; font-size: 14px; margin-bottom: 6px; }
        .product-info .price { color: #eee9ec; font-size: 16px; font-weight: 700; }

        .add-cart-btn {
            width: 100%;
            background: #e9e7e8;
            color: rgb(48, 3, 26);
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .add-cart-btn:hover { background: #8a5466; }

        .no-products {
            text-align: center;
            padding: 60px;
            color: #3A1320;
            grid-column: 1/-1;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>OrderEase</h1>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="login.html" id="loginLink">Login</a>
        <a href="cart.html" class="cart-btn">
            🛒 Cart (<span id="cartCount">0</span>)
        </a>
    </div>
</div>

<div class="container">

    <!-- FILTER SIDEBAR -->
    <div class="filter-box">
        <h3>🔍 Filter Products</h3>

        <div class="filter-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="Search products...">
        </div>

        <div class="filter-group">
            <label>Category</label>
            <select id="category">
                <option value="">All Categories</option>
                <option value="Food & Snacks">Food & Snacks</option>
                <option value="Cakes & Bakery">Cakes & Bakery</option>
                <option value="Health & Herbal">Health & Herbal</option>
                <option value="Handicrafts">Handicrafts</option>
                <option value="Beauty & Care">Beauty & Care</option>
                <option value="Plants & Seeds">Plants & Seeds</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Min Price (₹)</label>
            <input type="number" id="minPrice" placeholder="0">
        </div>

        <div class="filter-group">
            <label>Max Price (₹)</label>
            <input type="number" id="maxPrice" placeholder="10000">
        </div>

        <button class="filter-btn" onclick="loadProducts()">Apply Filter</button>
        <button class="clear-btn"  onclick="clearFilter()">Clear Filter</button>
    </div>

    <!-- PRODUCTS -->
    <div class="products-section">
        <h2>🛍️ All Products</h2>
        <div class="products-grid" id="productGrid">
            <p style="color:#3A1320;text-align:center;grid-column:1/-1;">
                Loading products...
            </p>
        </div>
    </div>

</div>

<script>
    // Cart count
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    document.getElementById('cartCount').textContent = cart.length;

    // Login link
    const customerToken = localStorage.getItem('customerToken');
    const customerName  = localStorage.getItem('customerName');
    if (customerToken) {
        document.getElementById('loginLink').textContent = customerName || 'My Account';
    }

    async function loadProducts() {
        const search   = document.getElementById('search').value;
        const category = document.getElementById('category').value;
        const minPrice = document.getElementById('minPrice').value;
        const maxPrice = document.getElementById('maxPrice').value;

        let url = '/api/products?';
        if (search)   url += `search=${search}&`;
        if (category) url += `category=${category}&`;
        if (minPrice) url += `minPrice=${minPrice}&`;
        if (maxPrice) url += `maxPrice=${maxPrice}&`;

        try {
            const response = await fetch(url);
            const products = await response.json();
            const grid     = document.getElementById('productGrid');

            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div class="no-products">
                        <p style="font-size:40px">😕</p>
                        <p>No products found!</p>
                    </div>`;
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card"
                     onclick="window.location.href='product-detail.html?id=${p.id}'">
                    src="${p.image.startsWith('http') ? p.image : '/images/' + p.image}"
                         onerror="this.src='https://placehold.co/300x160'"
                         alt="${p.name}">
                    <div class="product-info">
                        <div class="category">${p.category}</div>
                        <h4>${p.name}</h4>
                        <div class="price">₹${p.price}</div>
                        <button class="add-cart-btn"
                            onclick="event.stopPropagation();
                                     addToCart(${p.id},'${p.name}',${p.price})">
                            🛒 Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById('productGrid').innerHTML =
                '<p style="color:red;text-align:center;">Error loading products!</p>';
        }
    }

    function clearFilter() {
        document.getElementById('search').value   = '';
        document.getElementById('category').value = '';
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        loadProducts();
    }

    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const existing = cart.find(item => item.product_id === id);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({ product_id: id, name, price, quantity: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        document.getElementById('cartCount').textContent = cart.length;
        alert('✅ ' + name + ' added to cart!');
    }

    loadProducts();
</script>

</body>
</html>
